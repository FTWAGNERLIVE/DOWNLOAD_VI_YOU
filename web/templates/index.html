<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouDL - Baixe vídeos em 4K</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6d28d9;
            --primary-hover: #5b21b6;
            --secondary: #ec4899;
            --bg-color: #0f172a;
            --text: #f8fafc;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #020617, #0f172a, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            color: #94a3b8;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }
        input[type="url"], select {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="url"]:focus, select:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.3);
        }
        option { background-color: #0f172a; color: white; }
        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px 0 rgba(236, 72, 153, 0.39);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        #progress-container {
            display: none;
            margin-top: 2rem;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            border-radius: 6px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px #818cf8;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
        #result-container {
            display: none;
            margin-top: 2rem;
            padding: 2rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 16px;
            animation: slideUp 0.5s ease;
        }
        .success-text {
            color: #34d399;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .download-btn {
            display: inline-block;
            background: #10b981;
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
        }
        .download-btn:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
        }
        .error-message {
            color: #f43f5e;
            margin-top: 1rem;
            font-size: 0.95rem;
            display: none;
            background: rgba(244, 63, 94, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(244, 63, 94, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>YouDL</h1>
        <p class="subtitle">A forma mais elegante de baixar vídeos em Qualidade Máxima.</p>
        
        <div class="form-group">
            <input type="url" id="url" placeholder="Cole o link do YouTube aqui..." required>
            <select id="quality">
                <option value="best">Máxima Qualidade (Até 4K)</option>
                <option value="1080p">1080p (Full HD)</option>
                <option value="720p">720p (HD)</option>
                <option value="audio">Somente Áudio (MP3)</option>
            </select>
            <button id="btn-start">Iniciar Conversão</button>
        </div>

        <div id="error-msg" class="error-message"></div>

        <div id="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="pb-fill"></div>
            </div>
            <div class="progress-stats">
                <span id="stat-percent">0%</span>
                <span id="stat-speed">-- MB/s</span>
                <span id="stat-eta">ETA: --</span>
            </div>
            <div style="text-align: center; margin-top: 15px; color: #aacaeb; font-size: 0.95rem; font-weight: 600;" id="stat-status">Preparando o servidor...</div>
        </div>

        <div id="result-container">
            <div class="success-text">✨ Tudo pronto!</div>
            <a id="download-link" href="#" class="download-btn">Salvar para o Computador</a>
        </div>
    </div>

    <script>
        const btnStart = document.getElementById('btn-start');
        const urlInput = document.getElementById('url');
        const qualitySelect = document.getElementById('quality');
        const progressContainer = document.getElementById('progress-container');
        const resultContainer = document.getElementById('result-container');
        const errorMsg = document.getElementById('error-msg');
        
        const pbFill = document.getElementById('pb-fill');
        const statPercent = document.getElementById('stat-percent');
        const statSpeed = document.getElementById('stat-speed');
        const statEta = document.getElementById('stat-eta');
        const statStatus = document.getElementById('stat-status');
        const downloadLink = document.getElementById('download-link');

        async function openSaveDialog(jobId) {
            try {
                if (window.pywebview && window.pywebview.api) {
                    await window.pywebview.api.save_video(jobId);
                } else {
                    // Fallback se abrir no navegador normal
                    window.location.href = `/download/${jobId}`;
                }
            } catch (e) {
                console.error(e);
            }
        }

        function cleanString(str) {
            if(!str) return '';
            // Remove console ANSI color codes from python side
            return str.replace(/\x1b\[[0-9;]*m/g, '');
        }

        btnStart.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if(!url) {
                showError("Ei! Você esqueceu de colocar o link.");
                return;
            }

            errorMsg.style.display = 'none';
            resultContainer.style.display = 'none';
            progressContainer.style.display = 'block';
            btnStart.disabled = true;
            btnStart.textContent = 'Processando...';
            pbFill.style.width = '0%';
            statStatus.textContent = 'Extraindo qualidades...';

            try {
                const response = await fetch('/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, quality: qualitySelect.value })
                });
                
                const data = await response.json();
                if(data.error) throw new Error(data.error);

                pollStatus(data.job_id);

            } catch(e) {
                showError(e.message);
                resetForm();
            }
        });

        async function pollStatus(jobId) {
            try {
                const res = await fetch(`/status/${jobId}`);
                const data = await res.json();

                if(data.status === 'downloading') {
                    const progStr = cleanString(data.progress);
                    const pctClean = progStr.replace('%', '');
                    pbFill.style.width = `${pctClean}%`;
                    statPercent.textContent = progStr || '0%';
                    statSpeed.textContent = cleanString(data.speed) || '--';
                    statEta.textContent = `Faltam: ${cleanString(data.eta)}`;
                    statStatus.textContent = "Baixando dos servidores do YouTube...";

                } else if(data.status === 'processing') {
                    pbFill.style.width = '100%';
                    statPercent.textContent = 'Processando...';
                    statStatus.textContent = "Unindo Vídeo + Áudio em Alta Qualidade...";
                }

                if(data.status === 'completed') {
                    progressContainer.style.display = 'none';
                    resultContainer.style.display = 'block';
                    downloadLink.onclick = (e) => {
                        e.preventDefault();
                        openSaveDialog(jobId);
                    };
                    
                    // Restaura o formulario para aceitar novo video imediatamente
                    btnStart.disabled = false;
                    btnStart.textContent = 'Iniciar Nova Conversão';
                    urlInput.value = '';
                    
                } else if(data.status === 'error') {
                    showError("Erro: " + data.error);
                    resetForm();
                } else {
                    setTimeout(() => pollStatus(jobId), 1000);
                }
            } catch(e) {
                showError("Erro de comunicação com o servidor.");
                resetForm();
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            progressContainer.style.display = 'none';
        }

        function resetForm() {
            btnStart.disabled = false;
            btnStart.textContent = 'Iniciar Conversão';
        }
    </script>
</body>
</html>
